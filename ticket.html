<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>سیستم تیکت</title>
    <style>
        body {
            margin: 0;
            background: #ffffff;
            font-family: Arial, sans-serif;
            direction: rtl;
        }

        /* نوار طلایی دور صفحه */
        .border {
            position: fixed;
            pointer-events: none;
            z-index: 999;
        }

        .border-top,
        .border-bottom {
            left: 0;
            right: 0;
            height: 12px;
            background: linear-gradient(to right, #b8860b, #ffd700, #b8860b);
        }

        .border-top { top: 0; }
        .border-bottom { bottom: 0; }

        .border-left,
        .border-right {
            top: 0;
            bottom: 0;
            width: 12px;
            background: linear-gradient(to bottom, #b8860b, #ffd700, #b8860b);
        }

        .border-left { left: 0; }
        .border-right { right: 0; }

        /* هدر بالا */
        .top-bar {
            position: fixed;
            top: 12px;
            left: 12px;
            right: 12px;
            height: 80px;
            background: #f5f5f5;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            padding: 0 15px;
            box-sizing: border-box;
            z-index: 1000;
        }

        .top-bar input {
            margin-right: 10px;
            padding: 8px 10px;
            border-radius: 8px;
            border: 1px solid #aaa;
            font-size: 14px;
        }

        .top-bar button {
            margin-right: 10px;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            background: #000;
            color: #fff;
            cursor: pointer;
        }

        .top-bar button:hover {
            background: #333;
        }

        .role-label {
            margin-right: auto;
            font-size: 14px;
            color: #333;
        }

        /* دکمه برگشت به خانه */
        .home-btn {
            margin-right: 10px;
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            background: #b8860b;
            color: #fff;
            cursor: pointer;
        }

        .home-btn:hover {
            background: #d4a017;
        }

        /* محتوای اصلی */
        .main {
            position: fixed;
            top: 100px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            display: flex;
            gap: 10px;
        }

        /* لیست تیکت‌ها */
        .ticket-list {
            width: 30%;
            background: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            padding: 10px;
            box-sizing: border-box;
            overflow-y: auto;
        }

        .ticket-list h2 {
            margin-top: 0;
            font-size: 18px;
            text-align: center;
        }

        .ticket-item {
            background: #fff;
            border-radius: 8px;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .ticket-item.closed {
            background: #eee;
        }

        .ticket-item.deleted {
            background: #ddd;
            text-decoration: line-through;
        }

        .ticket-item span {
            display: block;
            font-size: 13px;
        }

        /* بخش تیکت انتخاب شده */
        .ticket-view {
            flex: 1;
            background: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .ticket-view h2 {
            margin-top: 0;
            font-size: 18px;
            text-align: center;
        }

        .ticket-info {
            font-size: 14px;
            margin-bottom: 10px;
        }

        .messages {
            flex: 1;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 8px;
            overflow-y: auto;
            font-size: 13px;
        }

        .msg {
            margin-bottom: 6px;
        }

        .msg span {
            display: inline-block;
        }

        .msg .author {
            font-weight: bold;
        }

        .msg .text {
            margin-right: 5px;
        }

        /* فرم پیام */
        .msg-form {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .msg-form input {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #aaa;
            font-size: 14px;
        }

        .msg-form button {
            padding: 8px 14px;
            border-radius: 8px;
            border: none;
            background: #000;
            color: #fff;
            cursor: pointer;
        }

        .msg-form button:hover {
            background: #333;
        }

        /* دکمه‌های مدیریت تیکت */
        .ticket-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
        }

        .ticket-actions button {
            padding: 6px 10px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-close { background: #ff9800; color: #fff; }
        .btn-open { background: #4caf50; color: #fff; }
        .btn-delete { background: #f44336; color: #fff; }

        .btn-close:hover { background: #fb8c00; }
        .btn-open:hover { background: #43a047; }
        .btn-delete:hover { background: #e53935; }

        /* بخش کامندها */
        .command-box {
            width: 25%;
            background: #f9f9f9;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            padding: 10px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
        }

        .command-box h2 {
            margin-top: 0;
            font-size: 18px;
            text-align: center;
        }

        .command-box input {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #aaa;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .command-log {
            flex: 1;
            background: #fff;
            border-radius: 8px;
            border: 1px solid #ddd;
            padding: 8px;
            overflow-y: auto;
            font-size: 12px;
        }

        .command-log div {
            margin-bottom: 4px;
        }

        .small {
            font-size: 12px;
            color: #555;
        }

        .btn-create-ticket {
            margin-top: 8px;
            padding: 8px 10px;
            border-radius: 8px;
            border: none;
            background: #000;
            color: #fff;
            cursor: pointer;
            font-size: 13px;
        }

        .btn-create-ticket:hover {
            background: #333;
        }
    </style>
</head>
<body>

    <!-- نوارهای طلایی -->
    <div class="border border-top"></div>
    <div class="border border-bottom"></div>
    <div class="border border-left"></div>
    <div class="border border-right"></div>

    <!-- هدر بالا -->
    <div class="top-bar">
        <span class="role-label" id="roleLabel">نقش: Member</span>

        <input id="usernameInput" type="text" placeholder="اسم شما چیست؟">

        <label style="margin-right:10px;">
            <input type="checkbox" id="opRequest"> ثبت نام به عنوان OP
        </label>

        <input id="opCodeInput" type="text" placeholder="کد OP" style="display:none;">

        <button onclick="setUser()">ثبت نام</button>

        <!-- دکمه برگشت به خانه -->
        <button class="home-btn" onclick="window.location.href='index.html'">بازگشت به خانه</button>
    </div>

    <!-- محتوای اصلی -->
    <div class="main">
        <div class="ticket-list">
            <h2>تیکت‌ها</h2>
            <button class="btn-create-ticket" onclick="createTicket()">ساخت تیکت جدید</button>
            <div class="small">ممبر فقط تیکت‌های خودش را می‌بیند.</div>
            <hr>
            <div id="ticketListContainer"></div>
        </div>

        <div class="ticket-view">
            <h2>جزئیات تیکت</h2>
            <div class="ticket-info" id="ticketInfo">هیچ تیکتی انتخاب نشده است.</div>
            <div class="messages" id="messagesContainer"></div>

            <div class="msg-form">
                <input id="msgInput" type="text" placeholder="پیام خود را بنویسید و Enter بزنید">
                <button onclick="sendMessage()">ارسال</button>
            </div>

            <div class="ticket-actions">
                <button class="btn-close" onclick="closeTicket()">بستن تیکت</button>
                <button class="btn-open" onclick="openTicket()">باز کردن تیکت</button>
                <button class="btn-delete" onclick="deleteTicket()">پاک کردن تیکت</button>
            </div>
            <div class="small">این دکمه‌ها فقط برای OP فعال هستند.</div>
        </div>

        <div class="command-box">
            <h2>کامندها</h2>
            <input id="commandInput" type="text" placeholder="کامند را وارد کنید و Enter بزنید">
            <div class="small">
                /help → لیست کامندها  
                /op (اسم) → دادن OP  
                /deop (اسم) → گرفتن OP
            </div>
            <hr>
            <div class="command-log" id="commandLog"></div>
        </div>
    </div>
<script>

    /* ذخیره‌سازی */
    const STORAGE_TICKETS = "tickets_v1";
    const STORAGE_OPS = "ops_v1";
    const STORAGE_USER = "current_user_v1";

    let currentUser = null;
    let currentTicketId = null;

    /* لود نقش‌ها */
    function loadOps() {
        let ops = localStorage.getItem(STORAGE_OPS);
        if (!ops) return [];
        try { return JSON.parse(ops); } catch { return []; }
    }

    function saveOps(ops) {
        localStorage.setItem(STORAGE_OPS, JSON.stringify(ops));
    }

    function isOP(name) {
        return loadOps().includes(name);
    }

    /* لود تیکت‌ها */
    function loadTickets() {
        let t = localStorage.getItem(STORAGE_TICKETS);
        if (!t) return [];
        try { return JSON.parse(t); } catch { return []; }
    }

    function saveTickets(tickets) {
        localStorage.setItem(STORAGE_TICKETS, JSON.stringify(tickets));
    }

    /* ثبت‌نام دائمی */
    function saveUser(name) {
        localStorage.setItem(STORAGE_USER, name);
    }

    function loadUser() {
        return localStorage.getItem(STORAGE_USER);
    }

    /* نمایش نقش */
    function updateRoleLabel() {
        const label = document.getElementById("roleLabel");
        if (!currentUser) {
            label.textContent = "نقش: Member";
            return;
        }
        label.textContent = isOP(currentUser)
            ? "نقش: OP (" + currentUser + ")"
            : "نقش: Member (" + currentUser + ")";
    }

    /* ثبت‌نام */
    document.getElementById("opRequest").addEventListener("change", function() {
        const codeField = document.getElementById("opCodeInput");
        codeField.style.display = this.checked ? "inline-block" : "none";
        if (!this.checked) codeField.value = "";
    });

    function setUser() {
        const name = document.getElementById("usernameInput").value.trim();
        const wantsOP = document.getElementById("opRequest").checked;
        const code = document.getElementById("opCodeInput").value.trim();

        if (!name) {
            alert("لطفاً نام خود را وارد کنید.");
            return;
        }

        currentUser = name;
        saveUser(name);

        if (wantsOP) {
            if (code === "TG PARHAM") {
                let ops = loadOps();
                if (!ops.includes(name)) {
                    ops.push(name);
                    saveOps(ops);
                }
                alert("✔ شما OP شدید.");
            } else {
                alert("❌ کد اشتباه است. شما Member هستید.");
            }
        }

        updateRoleLabel();
        refreshTicketList();
        logCommand("کاربر فعلی: " + currentUser);
    }

    /* اگر قبلاً ثبت‌نام کرده بود */
    window.onload = () => {
        const saved = loadUser();
        if (saved) {
            currentUser = saved;
            updateRoleLabel();
            refreshTicketList();
        }
    };

    /* ساخت تیکت */
    function createTicket() {
        if (!currentUser) {
            alert("اول نام خود را ثبت کنید.");
            return;
        }

        const subject = prompt("موضوع تیکت چیست؟");
        if (!subject) return;

        let tickets = loadTickets();
        const id = Date.now();

        tickets.push({
            id,
            owner: currentUser,
            subject,
            status: "open",
            messages: []
        });

        saveTickets(tickets);
        refreshTicketList();
        selectTicket(id);
    }

    /* لیست تیکت‌ها */
    function refreshTicketList() {
        const container = document.getElementById("ticketListContainer");
        container.innerHTML = "";

        if (!currentUser) {
            container.textContent = "اول نام خود را ثبت کنید.";
            return;
        }

        const tickets = loadTickets();
        const userIsOP = isOP(currentUser);

        tickets.forEach(t => {
            if (!userIsOP) {
                if (t.owner !== currentUser) return;
                if (t.status !== "open") return;
            }

            const div = document.createElement("div");
            div.className = "ticket-item";

            div.innerHTML = `
                <span>ID: ${t.id}</span>
                <span>صاحب: ${t.owner}</span>
                <span>موضوع: ${t.subject}</span>
                <span>وضعیت: ${t.status}</span>
            `;

            div.onclick = () => selectTicket(t.id);

            container.appendChild(div);
        });

        if (container.innerHTML === "") {
            container.textContent = "هیچ تیکتی برای نمایش وجود ندارد.";
        }
    }

    /* انتخاب تیکت */
    function selectTicket(id) {
        const tickets = loadTickets();
        const t = tickets.find(x => x.id === id);

        if (!t) {
            document.getElementById("ticketInfo").textContent = "تیکت پیدا نشد.";
            document.getElementById("messagesContainer").innerHTML = "";
            currentTicketId = null;
            return;
        }

        currentTicketId = id;

        document.getElementById("ticketInfo").innerHTML =
            `ID: ${t.id}<br>صاحب: ${t.owner}<br>موضوع: ${t.subject}<br>وضعیت: ${t.status}`;

        const msgContainer = document.getElementById("messagesContainer");
        msgContainer.innerHTML = "";

        t.messages.forEach(m => {
            msgContainer.innerHTML += `
                <div class="msg">
                    <span class="author">${m.author}:</span>
                    <span class="text">${m.text}</span>
                </div>
            `;
        });

        msgContainer.scrollTop = msgContainer.scrollHeight;
    }

    /* ارسال پیام */
    document.getElementById("msgInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter") sendMessage();
    });

    function sendMessage() {
        if (!currentUser) return;
        if (!currentTicketId) return;

        const tickets = loadTickets();
        const t = tickets.find(x => x.id === currentTicketId);
        if (!t) return;

        const userIsOP = isOP(currentUser);

        if (!userIsOP) {
            if (t.owner !== currentUser) {
                alert("شما فقط در تیکت خودتان می‌توانید چت کنید.");
                return;
            }
            if (t.status !== "open") {
                alert("این تیکت برای شما بسته یا حذف شده است.");
                return;
            }
        }

        const input = document.getElementById("msgInput");
        const text = input.value.trim();
        if (!text) return;

        t.messages.push({ author: currentUser, text });

        saveTickets(tickets);
        input.value = "";
        selectTicket(currentTicketId);
    }

    /* بستن تیکت */
    function closeTicket() {
        if (!currentTicketId) return;
        if (!isOP(currentUser)) return;

        const tickets = loadTickets();
        const t = tickets.find(x => x.id === currentTicketId);
        if (!t) return;

        t.status = "closed";
        saveTickets(tickets);
        refreshTicketList();
        selectTicket(currentTicketId);
    }

    /* باز کردن تیکت */
    function openTicket() {
        if (!currentTicketId) return;
        if (!isOP(currentUser)) return;

        const tickets = loadTickets();
        const t = tickets.find(x => x.id === currentTicketId);
        if (!t) return;

        t.status = "open";
        saveTickets(tickets);
        refreshTicketList();
        selectTicket(currentTicketId);
    }

    /* حذف کامل تیکت */
    function deleteTicket() {
        if (!currentTicketId) return;
        if (!isOP(currentUser)) return;

        let tickets = loadTickets();
        const index = tickets.findIndex(t => t.id === currentTicketId);

        if (index === -1) return;

        tickets.splice(index, 1); // حذف کامل

        saveTickets(tickets);

        currentTicketId = null;
        document.getElementById("ticketInfo").textContent = "تیکت حذف شد.";
        document.getElementById("messagesContainer").innerHTML = "";

        refreshTicketList();
    }

    /* کامندها */
    document.getElementById("commandInput").addEventListener("keydown", function(e) {
        if (e.key === "Enter") {
            handleCommand(this.value.trim());
            this.value = "";
        }
    });

    function logCommand(text) {
        const log = document.getElementById("commandLog");
        const div = document.createElement("div");
        div.textContent = text;
        log.appendChild(div);
        log.scrollTop = log.scrollHeight;
    }

    function handleCommand(cmd) {
        if (!cmd) return;

        logCommand("> " + cmd);

        if (cmd === "/help") {
            logCommand("/help → لیست کامندها");
            logCommand("/op (اسم) → دادن OP (فقط OP)");
            logCommand("/deop (اسم) → گرفتن OP (فقط OP)");
            return;
        }

        if (!isOP(currentUser)) {
            if (cmd.startsWith("/op") || cmd.startsWith("/deop")) {
                logCommand("❌ شما OP نیستید.");
                return;
            }
        }

        if (cmd.startsWith("/op ")) {
            const name = cmd.substring(4).trim();
            let ops = loadOps();
            if (!ops.includes(name)) {
                ops.push(name);
                saveOps(ops);
                logCommand("✔ " + name + " OP شد.");
            }
            updateRoleLabel();
            return;
        }

        if (cmd.startsWith("/deop ")) {
            const name = cmd.substring(6).trim();
            let ops = loadOps();
            const index = ops.indexOf(name);
            if (index !== -1) {
                ops.splice(index, 1);
                saveOps(ops);
                logCommand("✔ " + name + " دیگر OP نیست.");
            }
            updateRoleLabel();
            return;
        }

        logCommand("❌ کامند ناشناخته.");
    }

</script>

</body>
    <body>
    <!-- اینجا بقیهٔ محتوا یا تیکت‌ها -->

    <!-- فرم تیکت -->
    <form onsubmit="sendTicket(event)">
        <input id="name" placeholder="اسم شما" required>
        <input id="subject" placeholder="موضوع تیکت" required>
        <textarea id="message" placeholder="متن تیکت" required></textarea>
        <button type="submit">ارسال تیکت</button>
    </form>

    <!-- این خط اسکریپت باید اینجا باشه، نه اول صفحه -->
    <script src="ticket.js"></script>
</body>
</html>
